# separate terms of service, privacy policy, and support
# documentation.

# This workflow lets you generate SLSA provenance file for your project.
# The generation satisfies level 3 for the provenance requirements - see https://slsa.dev/spec/v0.1/requirements
# The project is an initiative of the OpenSSF (openssf.org) and is developed at
# https://github.com/slsa-framework/slsa-github-generator.
# The provenance file can be verified using https://github.com/slsa-framework/slsa-verifier.
# For more information about SLSA and how it improves the supply-chain, visit slsa.dev.

name: SLSA generic generator
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digests: ${{ steps.hash.outputs.digests }}

    steps:
      - uses: actions/checkout@v4

      # ========================================================
      #
      # Step 1: Build your artifacts.
      #
      # ========================================================
      - name: Build artifacts
        run: |
            # These are some amazing artifacts.
            echo "artifact1" > artifact1
            echo "artifact2" > artifact2

      # ========================================================
      #
      # Step 2: Add a step to generate the provenance subjects
      #         as shown below. Update the sha256 sum arguments
      #         to include all binaries that you generate
      #         provenance for.
      #
      # ========================================================
      - name: Generate subject for provenance
        id: hash
        run: |
          set -euo pipefail

          # List the artifacts the provenance will refer to.
          files=$(ls artifact*)
          # Generate the subjects (base64 encoded).
          echo "hashes=$(sha256sum $files | base64 -w0)" >> "${GITHUB_OUTPUT}"

  provenance:
    needs: [build]
    permissions:
      actions: read   # To read the workflow path.
      id-token: write # To sign the provenance.
      contents: write # To add assets to a release.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.4.0
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"
      upload-assets: true # Optional: Upload to a new release
      - name: Python Django Coverage GitHub Action
  # You may pin to the exact commit or the version.
  # uses: dc740/django-coveragepy-github-action@f8581a749bd8cf75838b120a6aa07dc40a060e61
  uses: dc740/django-coveragepy-github-action@0.9
  with:
    # Application
    django-app: # optional, default is 
    # Minimum allowed code coverage
    minimum-coverage: # optional, default is 10
    - name: AI PR Review, Fix & Security Scan
  # You may pin to the exact commit or the version.
  # uses: node9-ai/node9-pr-agent@a382e82cfd600e0a08461aca249966da62939a11
  uses: node9-ai/node9-pr-agent@v1
  with:
    # Anthropic API key
    anthropic_api_key: 
    # node9 SaaS key for audit trail
    node9_api_key: # optional, default is 
    # node9 API URL override
    node9_api_url: # optional, default is 
    # GitHub token for PR operations
    github_token: 
    # Command to run tests
    test_cmd: # optional, default is npm test
    # Head branch being reviewed
    head_ref: # optional, default is 
    # Base branch to diff against
    base_ref: # optional, default is main
    # Run iteration number (for run-again)
    iteration: # optional, default is 1
    # Feedback for run-again
    feedback: # optional, default is 
    # Existing draft PR number (for run-again)
    draft_pr_number: # optional, default is 
